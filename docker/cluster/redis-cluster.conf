# Redis cluster-mode configuration shared by every node in the optional 'cluster'
# Docker Compose profile. The three primaries are formed automatically by the
# `redis-cluster-init` one-shot service (`redis-cli --cluster create … --cluster-yes`)
# once all nodes are healthy. This file covers node configuration only; per-node
# port and cluster-announce-* values are passed on the command line in docker-compose.yml.

cluster-enabled yes

# Cluster membership and slot state are written to this file at runtime.
cluster-config-file nodes.conf

# A node is unreachable if it fails to respond within this window (milliseconds).
cluster-node-timeout 5000

# (dev) no persistence — keeps the cluster disposable across restarts
save ""
appendonly no
