# Redis cluster-mode configuration for the optional 'cluster' Docker Compose profile.
# After all 6 nodes are running, bootstrap the cluster with:
#   docker exec nest-cache-example-cluster-0 \
#     redis-cli --cluster create \
#     127.0.0.1:7000 127.0.0.1:7001 127.0.0.1:7002 \
#     127.0.0.1:7003 127.0.0.1:7004 127.0.0.1:7005 \
#     --cluster-replicas 1
# This file covers node configuration only — bootstrap runs separately.

cluster-enabled yes

# Cluster membership and slot state are written to this file at runtime.
cluster-config-file nodes.conf

# A node is unreachable if it fails to respond within this window (milliseconds).
cluster-node-timeout 5000

# (dev) no persistence — keeps the cluster disposable across restarts
save ""
appendonly no
