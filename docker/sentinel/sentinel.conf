# Sentinel configuration for the optional 'sentinel' Docker Compose profile.
# Master name 'mymaster' is the identifier used by ioredis Sentinel client options.
# Quorum of 2 means at least 2 sentinels must agree before a failover is triggered.

# Port sentinels listen on (each container uses the same internal port; host ports
# 26379 / 26380 / 26381 are remapped in docker-compose.yml).
port 26379

# Monitor the master. Quorum = 2 (majority of 3 sentinels must agree to failover).
sentinel monitor mymaster redis-master 6379 2

# Mark a master as down after it fails to respond for this many milliseconds.
sentinel down-after-milliseconds mymaster 5000

# Allow at most one replica to be reconfigured at a time during failover.
sentinel parallel-syncs mymaster 1

# After a failover, wait this many milliseconds before allowing another failover.
sentinel failover-timeout mymaster 10000
