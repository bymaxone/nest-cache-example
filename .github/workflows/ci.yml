# CI pipeline — runs on every push to main and every pull request.
#
# Mirrors the sibling example apps (nest-logger-example / nest-auth-example): a
# warm-the-cache install job fans out to lint, typecheck, unit coverage, API E2E,
# and the export-usage audit; the Playwright web smoke runs after the API E2E; a
# final job aggregates coverage. Adapted for this app: Redis (not Postgres), the
# API E2E boots redis:7-alpine via Testcontainers (no compose), and the consumed
# @bymax-one/nest-cache library is provisioned from its `file:` source by the
# shared ./.github/actions/setup composite.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref so only the latest commit is verified.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Type-check
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  format:
    name: Format check
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  unit:
    name: Unit tests + coverage
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      # Each app's gate enforces 100/100/100/100 and caps its own worker pool
      # (maxWorkers '50%'); they run as separate sequential steps so the locally
      # linked library is never duplicated across two runners at once.
      - name: API unit coverage
        run: pnpm test:cov:api
      - name: Web unit coverage
        run: pnpm test:cov:web
      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-api
          path: apps/api/coverage/
          retention-days: 7
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-web
          path: apps/web/coverage/
          retention-days: 7

  e2e-api:
    name: E2E — API
    needs: install
    runs-on: ubuntu-latest
    # GitHub-hosted runners ship a Docker daemon, so the suite's Testcontainers
    # boots redis:7-alpine (with keyspace notifications) directly — no services block.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run API e2e tests
        run: pnpm --filter api run test:e2e

  e2e-web:
    name: E2E — Web (Playwright)
    needs: e2e-api
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # API process
      PORT: '3001'
      WEB_ORIGIN: http://localhost:3000
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      CACHE_MODE: standalone
      # Web build/runtime → API
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      # Playwright targets
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Build API
        run: pnpm --filter api run build
      - name: Build web
        run: pnpm --filter web run build
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      # Boot the API and web servers and run the smoke in ONE step: backgrounded
      # processes are torn down when a step's shell exits, so they must outlive the
      # wait + test within the same shell. Server output is captured for triage.
      - name: Boot the stack and run the web smoke
        run: |
          set -euo pipefail
          pnpm --filter api run start > /tmp/api.log 2>&1 &
          pnpm --filter web run start > /tmp/web.log 2>&1 &
          npx --yes wait-on -t 90000 http-get://localhost:3001/health http-get://localhost:3000
          pnpm --filter web run test:e2e
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo '----- API -----'; cat /tmp/api.log || true
          echo '----- WEB -----'; cat /tmp/web.log || true
      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: apps/web/test-results/
          retention-days: 7

  export-usage-check:
    name: Export usage audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: pnpm audit:exports

  web-build:
    name: Web production build
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # The bundle proof asserts no @nestjs / ioredis leak into the client bundle.
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: pnpm --filter web run build

  mutation:
    name: Mutation testing
    # Gated behind the unit job: Stryker re-runs the same suites internally, so there is
    # no point spending up to 45 minutes mutating a tree whose baseline tests are red.
    needs: [install, unit]
    runs-on: ubuntu-latest
    # Gated: enforces api `break: 100` (zero survivors) and web `break: 90` (lib 100).
    # `pnpm mutation` fans out serialized (`--workspace-concurrency=1`) so the locally
    # linked @bymax-one/nest-cache is never duplicated across two Stryker runs at once;
    # each app's `concurrency: 2` keeps the per-run worker pool within a 2-core runner.
    # To make it advisory instead of blocking, add `continue-on-error: true` to the run.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run Stryker mutation (api break:100, web break:90)
        run: pnpm mutation
      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: |
            apps/api/reports/mutation/
            apps/web/reports/mutation/
          retention-days: 7

  coverage-report:
    name: Coverage report
    needs: [unit, e2e-api, e2e-web]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download API coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-api
          path: coverage/api
        continue-on-error: true
      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-web
          path: coverage/web
        continue-on-error: true
      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage/
          retention-days: 30
