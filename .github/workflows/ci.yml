# CI — thin caller of the org-wide reusable pipeline (bymaxone/.github).
#
# The whole pipeline (lint, typecheck, format, coverage, e2e, export audit,
# mutation) lives in bymaxone/.github so every repo shares one definition.
# Mutation runs only on a push to main / manual dispatch, never on PRs or a
# schedule. The reusables are versioned via the @v1 tag on bymaxone/.github.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: bymaxone/.github/.github/workflows/node-ci.yml@v1
    with:
      library-repo: bymaxone/nest-cache
      has-web: true
      run-export-audit: true
      run-mutation: true
      mutation-source-globs: '^(apps/api/src/|apps/web/lib/|apps/web/components/)'
    secrets: inherit

  security:
    uses: bymaxone/.github/.github/workflows/security.yml@v1
    with:
      fail-on-severity: high
    secrets: inherit
