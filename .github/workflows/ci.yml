# Example-app CI bar (DEVELOPMENT_PLAN.md Appendix C): lint + typecheck + unit coverage
# + E2E smoke + web build. The revised bar treats this reference app as hard as the
# library: 100% unit coverage on both apps (the `test:cov` job below).
# Stub: the export-usage check and release polish are added with the full CI later.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the jobs only check out, install, and run checks — no writes.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:cov:
    runs-on: ubuntu-latest
    # Docker-free unit tier: both apps' 100/100/100/100 coverage gate. The two suites
    # run as separate sequential steps (never concurrently) so the per-worker reload of
    # the locally-linked `@bymax-one/nest-cache` `file:` dependency cannot multiply and
    # exhaust the runner's memory.
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api test:cov
      - run: pnpm --filter web test:cov

  e2e:
    runs-on: ubuntu-latest
    # GitHub-hosted runners ship a Docker daemon, so Testcontainers boots
    # redis:7-alpine (with --notify-keyspace-events Ex) directly — no services: block.
    # Scoped to the API suite: the web Playwright smoke is a running-stack check
    # (web + API + Redis) run locally / in the fuller stack job, not this stub.
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api test:e2e

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
