services:
  redis:
    image: redis:7-alpine
    container_name: nest-cache-example-redis
    restart: unless-stopped
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redisinsight:
    image: redis/redisinsight:2
    container_name: nest-cache-example-redisinsight
    profiles: ['tools']
    restart: unless-stopped
    ports:
      - '127.0.0.1:5540:5540'
    depends_on:
      redis:
        condition: service_healthy

  redis-cluster-0:
    image: redis:7-alpine
    container_name: nest-cache-example-cluster-0
    profiles: ['cluster']
    restart: unless-stopped
    command:
      [
        'redis-server',
        '/usr/local/etc/redis/redis-cluster.conf',
        '--port',
        '7000',
        '--cluster-announce-ip',
        '127.0.0.1',
        '--cluster-announce-port',
        '7000',
        '--cluster-announce-bus-port',
        '17000',
      ]
    ports:
      - '127.0.0.1:7000:7000'
    volumes:
      - ./docker/cluster/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '7000', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

