services:
  redis:
    image: redis:7-alpine
    container_name: nest-cache-example-redis
    restart: unless-stopped
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redisinsight:
    image: redis/redisinsight:2
    container_name: nest-cache-example-redisinsight
    profiles: ['tools']
    restart: unless-stopped
    ports:
      - '127.0.0.1:5540:5540'
    depends_on:
      redis:
        condition: service_healthy

  # Cluster topology — 3 cluster-enabled primaries on a dedicated bridge network
  # with fixed IPs (gated by --profile cluster). Each node announces its INTERNAL
  # 172.31.0.x address so the cluster-bus gossip works between containers (a node
  # announcing 127.0.0.1 would point its peers at themselves and the cluster would
  # never form). A HOST client reaches the cluster through the published
  # 127.0.0.1:700x ports plus an ioredis natMap that rewrites the announced
  # 172.31.0.x:700x addresses — see cache.config.ts and spec §15.2. Run with:
  #   docker compose --profile cluster up -d --wait
  #   CACHE_MODE=cluster \
  #   REDIS_CLUSTER_NODES=127.0.0.1:7000,127.0.0.1:7001,127.0.0.1:7002 \
  #   REDIS_CLUSTER_NAT_MAP=172.31.0.11:7000=127.0.0.1:7000,172.31.0.12:7001=127.0.0.1:7001,172.31.0.13:7002=127.0.0.1:7002
  redis-cluster-0:
    image: redis:7-alpine
    container_name: nest-cache-example-cluster-0
    profiles: ['cluster']
    restart: unless-stopped
    command:
      [
        'redis-server',
        '/usr/local/etc/redis/redis-cluster.conf',
        '--port',
        '7000',
        '--cluster-announce-ip',
        '172.31.0.11',
        '--cluster-announce-port',
        '7000',
        '--cluster-announce-bus-port',
        '17000',
      ]
    ports:
      - '127.0.0.1:7000:7000'
    networks:
      cluster-net:
        ipv4_address: 172.31.0.11
    volumes:
      - ./docker/cluster/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '7000', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis-cluster-1:
    image: redis:7-alpine
    container_name: nest-cache-example-cluster-1
    profiles: ['cluster']
    restart: unless-stopped
    command:
      [
        'redis-server',
        '/usr/local/etc/redis/redis-cluster.conf',
        '--port',
        '7001',
        '--cluster-announce-ip',
        '172.31.0.12',
        '--cluster-announce-port',
        '7001',
        '--cluster-announce-bus-port',
        '17001',
      ]
    ports:
      - '127.0.0.1:7001:7001'
    networks:
      cluster-net:
        ipv4_address: 172.31.0.12
    volumes:
      - ./docker/cluster/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '7001', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis-cluster-2:
    image: redis:7-alpine
    container_name: nest-cache-example-cluster-2
    profiles: ['cluster']
    restart: unless-stopped
    command:
      [
        'redis-server',
        '/usr/local/etc/redis/redis-cluster.conf',
        '--port',
        '7002',
        '--cluster-announce-ip',
        '172.31.0.13',
        '--cluster-announce-port',
        '7002',
        '--cluster-announce-bus-port',
        '17002',
      ]
    ports:
      - '127.0.0.1:7002:7002'
    networks:
      cluster-net:
        ipv4_address: 172.31.0.13
    volumes:
      - ./docker/cluster/redis-cluster.conf:/usr/local/etc/redis/redis-cluster.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '7002', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # One-shot bootstrap: forms the cluster once all three primaries are healthy.
  # `--cluster create` is addressed by the nodes' internal IPs (this container is
  # on cluster-net), so gossip succeeds and the cluster reaches `cluster_state:ok`.
  # `|| true` keeps a re-run (cluster already formed) from failing the profile.
  redis-cluster-init:
    image: redis:7-alpine
    container_name: nest-cache-example-cluster-init
    profiles: ['cluster']
    restart: 'no'
    networks:
      - cluster-net
    depends_on:
      redis-cluster-0:
        condition: service_healthy
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        redis-cli --cluster create \
          172.31.0.11:7000 172.31.0.12:7001 172.31.0.13:7002 \
          --cluster-yes || true

  # Sentinel topology — 1 master + 2 replicas + 3 sentinels (gated by --profile sentinel).
  # Connect the app with mode=sentinel, sentinels at 127.0.0.1:26379/26380/26381, name=mymaster.
  # The sentinels report the master by its service hostname (redis-master:6379); a host
  # client translates it with an ioredis natMap (REDIS_SENTINEL_NAT_MAP) — see cache.config.ts.
  redis-master:
    image: redis:7-alpine
    container_name: nest-cache-example-sentinel-master
    profiles: ['sentinel']
    restart: unless-stopped
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - ./docker/sentinel/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis-replica-1:
    image: redis:7-alpine
    container_name: nest-cache-example-sentinel-replica-1
    profiles: ['sentinel']
    restart: unless-stopped
    command:
      ['redis-server', '/usr/local/etc/redis/redis.conf', '--replicaof', 'redis-master', '6379']
    ports:
      - '127.0.0.1:6381:6379'
    volumes:
      - ./docker/sentinel/redis.conf:/usr/local/etc/redis/redis.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    container_name: nest-cache-example-sentinel-replica-2
    profiles: ['sentinel']
    restart: unless-stopped
    command:
      ['redis-server', '/usr/local/etc/redis/redis.conf', '--replicaof', 'redis-master', '6379']
    ports:
      - '127.0.0.1:6382:6379'
    volumes:
      - ./docker/sentinel/redis.conf:/usr/local/etc/redis/redis.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: nest-cache-example-sentinel-1
    profiles: ['sentinel']
    restart: unless-stopped
    # Copy the read-only template into a named volume on first start so Sentinel can
    # rewrite /usr/local/etc/redis/sentinel.conf during failover without dirtying the repo.
    # On container restart after failover the volume copy (updated by Sentinel) is used.
    entrypoint:
      - /bin/sh
      - -c
      - |
        [ -f /usr/local/etc/redis/sentinel.conf ] || cp /tmp/sentinel-template.conf /usr/local/etc/redis/sentinel.conf
        exec redis-sentinel /usr/local/etc/redis/sentinel.conf
    ports:
      - '127.0.0.1:26379:26379'
    volumes:
      - ./docker/sentinel/sentinel.conf:/tmp/sentinel-template.conf:ro
      - sentinel-1-conf:/usr/local/etc/redis
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: nest-cache-example-sentinel-2
    profiles: ['sentinel']
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        [ -f /usr/local/etc/redis/sentinel.conf ] || cp /tmp/sentinel-template.conf /usr/local/etc/redis/sentinel.conf
        exec redis-sentinel /usr/local/etc/redis/sentinel.conf
    ports:
      - '127.0.0.1:26380:26379'
    volumes:
      - ./docker/sentinel/sentinel.conf:/tmp/sentinel-template.conf:ro
      - sentinel-2-conf:/usr/local/etc/redis
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: nest-cache-example-sentinel-3
    profiles: ['sentinel']
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        [ -f /usr/local/etc/redis/sentinel.conf ] || cp /tmp/sentinel-template.conf /usr/local/etc/redis/sentinel.conf
        exec redis-sentinel /usr/local/etc/redis/sentinel.conf
    ports:
      - '127.0.0.1:26381:26379'
    volumes:
      - ./docker/sentinel/sentinel.conf:/tmp/sentinel-template.conf:ro
      - sentinel-3-conf:/usr/local/etc/redis
    depends_on:
      redis-master:
        condition: service_healthy

networks:
  # Dedicated fixed-subnet bridge for the cluster profile, so each node can
  # announce a stable internal IP that the natMap (REDIS_CLUSTER_NAT_MAP) targets.
  # If this subnet collides with an existing Docker network on your host, change
  # it here and update the matching cluster-announce-ip + REDIS_CLUSTER_NAT_MAP values.
  cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

volumes:
  redis-data:
  sentinel-1-conf:
  sentinel-2-conf:
  sentinel-3-conf:
